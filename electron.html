<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bleTones - Generative Sound Experience</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow: hidden;
            color: #e8e8e8;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            z-index: 10;
        }

        h1 {
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            color: #e8d5b7;
            text-shadow: 0 0 30px rgba(232, 213, 183, 0.3);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1rem;
            color: #8e9aaf;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        #start-btn {
            background: linear-gradient(135deg, #e8d5b7 0%, #d4a373 100%);
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            letter-spacing: 0.2em;
            color: #1a1a2e;
            cursor: pointer;
            border-radius: 50px;
            margin: 20px 0;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-weight: 600;
            z-index: 10;
        }

        #start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(232, 213, 183, 0.4);
        }

        #start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #visualizer {
            width: 100%;
            height: 100%;
        }

        .instructions {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            background: rgba(26, 26, 46, 0.8);
            padding: 15px 30px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .instructions p {
            font-size: 0.9rem;
            color: #8e9aaf;
            margin: 5px 0;
        }

        .instructions strong {
            color: #e8d5b7;
        }

        .info-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(26, 26, 46, 0.8);
            padding: 15px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            z-index: 10;
            font-size: 0.85rem;
        }

        .info-panel h3 {
            color: #e8d5b7;
            margin-bottom: 10px;
            font-weight: 400;
            letter-spacing: 0.1em;
        }

        .stat {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            color: #8e9aaf;
        }

        .stat-value {
            color: #e8d5b7;
            font-family: monospace;
        }

        .sound-mode {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 10;
        }

        .mode-btn {
            background: rgba(232, 213, 183, 0.1);
            border: 1px solid rgba(232, 213, 183, 0.3);
            padding: 8px 16px;
            font-size: 0.8rem;
            color: #e8d5b7;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .mode-btn:hover {
            background: rgba(232, 213, 183, 0.2);
        }

        .mode-btn.active {
            background: rgba(232, 213, 183, 0.3);
            border-color: #e8d5b7;
        }

        .credits {
            position: fixed;
            bottom: 10px;
            right: 20px;
            font-size: 0.75rem;
            color: #555;
            z-index: 10;
        }

        .credits a {
            color: #8e9aaf;
            text-decoration: none;
        }

        .input-mode {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
            z-index: 10;
        }

        .input-btn {
            background: rgba(100, 180, 255, 0.1);
            border: 1px solid rgba(100, 180, 255, 0.3);
            padding: 8px 16px;
            font-size: 0.8rem;
            color: #64b4ff;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .input-btn:hover {
            background: rgba(100, 180, 255, 0.2);
        }

        .input-btn.active {
            background: rgba(100, 180, 255, 0.3);
            border-color: #64b4ff;
        }

        .input-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .ble-status {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(26, 26, 46, 0.8);
            padding: 15px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            z-index: 10;
            font-size: 0.85rem;
            max-width: 300px;
        }

        .ble-status h3 {
            color: #64b4ff;
            margin-bottom: 10px;
            font-weight: 400;
            letter-spacing: 0.1em;
        }

        .ble-status.hidden {
            display: none;
        }

        .device-list {
            max-height: 150px;
            overflow-y: auto;
            margin-top: 10px;
        }

        .device-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid rgba(100, 180, 255, 0.1);
            font-size: 0.75rem;
        }

        .device-name {
            color: #8e9aaf;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .device-rssi {
            color: #64b4ff;
            font-family: monospace;
        }

        .ble-error {
            color: #ff6b6b;
            font-size: 0.8rem;
            margin-top: 10px;
        }

        .ble-info {
            color: #f0c674;
            font-size: 0.75rem;
            margin-top: 8px;
            padding: 8px;
            background: rgba(240, 198, 116, 0.1);
            border-radius: 5px;
            line-height: 1.4;
        }

        .ble-info a {
            color: #64b4ff;
            text-decoration: underline;
        }

        .ble-scanning {
            color: #64b4ff;
            animation: pulse 1.5s infinite;
        }

        .ble-btn-group {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .ble-btn-group .input-btn {
            flex: 1;
            min-width: 100px;
            font-size: 0.75rem;
            padding: 8px 12px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Ripple effect */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(232, 213, 183, 0.4) 0%, transparent 70%);
            pointer-events: none;
            animation: ripple-animation 1.5s ease-out forwards;
            z-index: 5;
        }

        @keyframes ripple-animation {
            0% {
                width: 0;
                height: 0;
                opacity: 1;
            }
            100% {
                width: 300px;
                height: 300px;
                opacity: 0;
                margin-left: -150px;
                margin-top: -150px;
            }
        }

        /* Mobile styles */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .info-panel {
                display: none;
            }

            .instructions {
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="canvas-container">
        <canvas id="visualizer"></canvas>
    </div>

    <div class="container">
        <header>
            <h1>bleTones</h1>
            <p class="subtitle">Generative Sound Experience</p>
        </header>

        <button id="start-btn">Begin Experience</button>

        <div class="sound-mode">
            <button class="mode-btn active" data-mode="woodChime">Wood Chimes</button>
            <button class="mode-btn" data-mode="deepLog">Deep Log</button>
            <button class="mode-btn" data-mode="hollowReed">Hollow Reed</button>
            <button class="mode-btn" data-mode="kalimba">Kalimba</button>
        </div>

        <div class="input-mode">
            <button class="input-btn active" data-input="mouse">🖱️ Mouse/Touch</button>
            <button class="input-btn" data-input="ble" id="ble-mode-btn">📡 BLE Devices</button>
        </div>
    </div>

    <div class="ble-status hidden" id="ble-status">
        <h3>📡 BLE Scanner</h3>
        <div id="ble-scanning-status">Choose a scanning mode below</div>
        <div class="ble-btn-group">
            <button id="ble-scan-btn" class="input-btn">🔍 Real BLE</button>
            <button id="ble-demo-btn" class="input-btn">🎭 Demo Mode</button>
        </div>
        <div class="device-list" id="device-list"></div>
        <div class="ble-info" id="ble-info"></div>
        <div class="ble-error" id="ble-error"></div>
    </div>

    <div class="info-panel">
        <h3>Sound Stats</h3>
        <div class="stat">
            <span>Notes Played:</span>
            <span class="stat-value" id="note-count">0</span>
        </div>
        <div class="stat">
            <span>Current Freq:</span>
            <span class="stat-value" id="current-freq">--</span>
        </div>
        <div class="stat">
            <span>Velocity:</span>
            <span class="stat-value" id="velocity">--</span>
        </div>
    </div>

    <div class="instructions" id="instructions">
        <p><strong>Move your mouse</strong> or <strong>touch the screen</strong> to create sounds</p>
        <p>Movement speed affects volume • Position affects pitch</p>
    </div>

    <div class="credits">
        <a href="https://github.com/chrisfromthepast/bleTones" target="_blank">View on GitHub</a>
    </div>

    <script>
        // ======================
        // bleTones Web Audio Implementation
        // Inspired by the original SuperCollider generative music system
        // ======================

        class BleTones {
            constructor() {
                this.audioContext = null;
                this.masterGain = null;
                this.reverbNode = null;
                this.isActive = false;
                this.noteCount = 0;
                this.lastPosition = { x: 0, y: 0 };
                this.lastTime = 0;
                this.currentMode = 'woodChime';
                
                // Musical configuration (matching SuperCollider version)
                this.config = {
                    masterVol: 0.6,
                    rootNote: 36, // MIDI note number
                    scale: [0, 2, 3, 7, 9], // Minor pentatonic intervals
                    movementThreshold: 5,
                    minStrikeInterval: 100 // ms
                };
                
                this.lastStrikeTime = 0;
            }

            async init() {
                // Create audio context
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // Create master gain
                this.masterGain = this.audioContext.createGain();
                this.masterGain.gain.value = this.config.masterVol;
                this.masterGain.connect(this.audioContext.destination);
                
                // Create reverb send bus
                // Instruments connect to reverbInput, which splits to dry + wet paths
                this.reverbInput = this.audioContext.createGain();
                this.createReverb();
                
                this.isActive = true;
                console.log('🎵 bleTones initialized');
            }

            createReverb() {
                const ctx = this.audioContext;
                
                // Create convolver for reverb
                const convolver = ctx.createConvolver();
                const sampleRate = ctx.sampleRate;
                const length = sampleRate * 2; // 2 second reverb tail
                const impulse = ctx.createBuffer(2, length, sampleRate);
                
                for (let channel = 0; channel < 2; channel++) {
                    const channelData = impulse.getChannelData(channel);
                    for (let i = 0; i < length; i++) {
                        channelData[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2);
                    }
                }
                convolver.buffer = impulse;
                
                // Dry path (direct signal)
                const dryGain = ctx.createGain();
                dryGain.gain.value = 0.7;
                
                // Wet path (reverb signal)
                const wetGain = ctx.createGain();
                wetGain.gain.value = 0.3;
                
                // Connect: reverbInput -> dry -> masterGain
                //          reverbInput -> convolver -> wet -> masterGain
                this.reverbInput.connect(dryGain);
                this.reverbInput.connect(convolver);
                convolver.connect(wetGain);
                
                dryGain.connect(this.masterGain);
                wetGain.connect(this.masterGain);
            }

            // Convert scale degree to frequency (matching SuperCollider behavior)
            degreeToFreq(degree) {
                const rootFreq = 440 * Math.pow(2, (this.config.rootNote - 69) / 12);
                const scaleLen = this.config.scale.length;
                const octave = Math.floor(degree / scaleLen);
                const scaleDegree = Math.floor(degree) % scaleLen;
                const interval = this.config.scale[Math.abs(scaleDegree)];
                return rootFreq * Math.pow(2, (interval + octave * 12) / 12);
            }

            // Wood Chime sound (matching SuperCollider \woodChime)
            playWoodChime(freq, amp, pan) {
                const ctx = this.audioContext;
                const now = ctx.currentTime;
                
                // Create noise burst (exciter)
                const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.01, ctx.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseData.length; i++) {
                    noiseData[i] = (Math.random() * 2 - 1) * 0.1;
                }
                
                const noise = ctx.createBufferSource();
                noise.buffer = noiseBuffer;
                
                // Create resonant filters (simulating Ringz)
                const filter1 = ctx.createBiquadFilter();
                filter1.type = 'bandpass';
                filter1.frequency.value = freq;
                filter1.Q.value = 30;
                
                const filter2 = ctx.createBiquadFilter();
                filter2.type = 'bandpass';
                filter2.frequency.value = freq * 2.01;
                filter2.Q.value = 25;
                
                // Low pass filter for warmer tone
                const lpf = ctx.createBiquadFilter();
                lpf.type = 'lowpass';
                lpf.frequency.value = Math.min(freq * 4, 3000);
                
                // Envelope
                const envelope = ctx.createGain();
                envelope.gain.setValueAtTime(0, now);
                envelope.gain.linearRampToValueAtTime(amp, now + 0.002);
                envelope.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
                
                // Panning
                const panner = ctx.createStereoPanner();
                panner.pan.value = pan;
                
                // Connect
                noise.connect(filter1);
                noise.connect(filter2);
                filter1.connect(lpf);
                filter2.connect(lpf);
                lpf.connect(envelope);
                envelope.connect(panner);
                panner.connect(this.reverbInput);
                
                noise.start(now);
                noise.stop(now + 0.01);
                
                // Schedule cleanup
                setTimeout(() => {
                    filter1.disconnect();
                    filter2.disconnect();
                    lpf.disconnect();
                    envelope.disconnect();
                    panner.disconnect();
                }, 1000);
            }

            // Deep Log drum sound (matching SuperCollider \deepLog)
            playDeepLog(freq, amp, pan) {
                const ctx = this.audioContext;
                const now = ctx.currentTime;
                
                // Create sine oscillators
                const osc1 = ctx.createOscillator();
                const osc2 = ctx.createOscillator();
                const osc3 = ctx.createOscillator();
                
                osc1.frequency.value = freq;
                osc2.frequency.value = freq * 1.5;
                osc3.frequency.value = freq * 2.6;
                
                // Gains for each oscillator
                const gain1 = ctx.createGain();
                const gain2 = ctx.createGain();
                const gain3 = ctx.createGain();
                
                gain1.gain.value = amp;
                gain2.gain.value = amp * 0.4;
                gain3.gain.value = amp * 0.2;
                
                // Main envelope
                const envelope = ctx.createGain();
                envelope.gain.setValueAtTime(0, now);
                envelope.gain.linearRampToValueAtTime(1, now + 0.01);
                envelope.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
                
                // Low pass
                const lpf = ctx.createBiquadFilter();
                lpf.type = 'lowpass';
                lpf.frequency.value = 1000;
                
                // Panning
                const panner = ctx.createStereoPanner();
                panner.pan.value = pan;
                
                // Connect
                osc1.connect(gain1);
                osc2.connect(gain2);
                osc3.connect(gain3);
                gain1.connect(lpf);
                gain2.connect(lpf);
                gain3.connect(lpf);
                lpf.connect(envelope);
                envelope.connect(panner);
                panner.connect(this.reverbInput);
                
                osc1.start(now);
                osc2.start(now);
                osc3.start(now);
                osc1.stop(now + 1.3);
                osc2.stop(now + 1.3);
                osc3.stop(now + 1.3);
                
                setTimeout(() => {
                    gain1.disconnect();
                    gain2.disconnect();
                    gain3.disconnect();
                    lpf.disconnect();
                    envelope.disconnect();
                    panner.disconnect();
                }, 1500);
            }

            // Hollow Reed sound (matching SuperCollider \hollowReed)
            playHollowReed(freq, amp, pan) {
                const ctx = this.audioContext;
                const now = ctx.currentTime;
                
                // Create noise burst
                const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.005, ctx.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseData.length; i++) {
                    noiseData[i] = (Math.random() * 2 - 1) * 0.03;
                }
                
                const noise = ctx.createBufferSource();
                noise.buffer = noiseBuffer;
                
                // Bandpass filters for hollow sound
                const filter1 = ctx.createBiquadFilter();
                filter1.type = 'bandpass';
                filter1.frequency.value = freq * 2;
                filter1.Q.value = 15;
                
                const filter2 = ctx.createBiquadFilter();
                filter2.type = 'bandpass';
                filter2.frequency.value = freq * 3;
                filter2.Q.value = 12;
                
                // Main bandpass
                const mainBpf = ctx.createBiquadFilter();
                mainBpf.type = 'bandpass';
                mainBpf.frequency.value = freq * 2;
                mainBpf.Q.value = 2.5;
                
                // Envelope
                const envelope = ctx.createGain();
                envelope.gain.setValueAtTime(0, now);
                envelope.gain.linearRampToValueAtTime(amp, now + 0.002);
                envelope.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                
                // Panning
                const panner = ctx.createStereoPanner();
                panner.pan.value = pan;
                
                // Connect
                noise.connect(filter1);
                noise.connect(filter2);
                filter1.connect(mainBpf);
                filter2.connect(mainBpf);
                mainBpf.connect(envelope);
                envelope.connect(panner);
                panner.connect(this.reverbInput);
                
                noise.start(now);
                noise.stop(now + 0.005);
                
                setTimeout(() => {
                    filter1.disconnect();
                    filter2.disconnect();
                    mainBpf.disconnect();
                    envelope.disconnect();
                    panner.disconnect();
                }, 600);
            }

            // Kalimba sound (matching SuperCollider \kalimba)
            playKalimba(freq, amp, pan) {
                const ctx = this.audioContext;
                const now = ctx.currentTime;
                
                // Sine + detuned saw
                const osc1 = ctx.createOscillator();
                osc1.type = 'sine';
                osc1.frequency.value = freq;
                
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.value = freq * 2.01;
                
                const gain1 = ctx.createGain();
                const gain2 = ctx.createGain();
                gain1.gain.value = amp;
                gain2.gain.value = amp * 0.1;
                
                // Low pass
                const lpf = ctx.createBiquadFilter();
                lpf.type = 'lowpass';
                lpf.frequency.value = freq * 3;
                
                // Envelope with exponential decay
                const envelope = ctx.createGain();
                envelope.gain.setValueAtTime(0, now);
                envelope.gain.linearRampToValueAtTime(1, now + 0.002);
                envelope.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
                
                // Panning
                const panner = ctx.createStereoPanner();
                panner.pan.value = pan;
                
                // Connect
                osc1.connect(gain1);
                osc2.connect(gain2);
                gain1.connect(lpf);
                gain2.connect(lpf);
                lpf.connect(envelope);
                envelope.connect(panner);
                panner.connect(this.reverbInput);
                
                osc1.start(now);
                osc2.start(now);
                osc1.stop(now + 1.3);
                osc2.stop(now + 1.3);
                
                setTimeout(() => {
                    gain1.disconnect();
                    gain2.disconnect();
                    lpf.disconnect();
                    envelope.disconnect();
                    panner.disconnect();
                }, 1500);
            }

            // Play a note based on current mode
            playNote(freq, amp, pan) {
                switch (this.currentMode) {
                    case 'woodChime':
                        this.playWoodChime(freq, amp, pan);
                        break;
                    case 'deepLog':
                        this.playDeepLog(freq, amp, pan);
                        break;
                    case 'hollowReed':
                        this.playHollowReed(freq, amp, pan);
                        break;
                    case 'kalimba':
                        this.playKalimba(freq, amp, pan);
                        break;
                }
            }

            // Process movement (similar to BLE RSSI processing)
            processMovement(x, y, timestamp) {
                if (!this.isActive) return;
                
                const dx = x - this.lastPosition.x;
                const dy = y - this.lastPosition.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const dt = timestamp - this.lastTime;
                
                // Calculate velocity (like RSSI delta)
                const velocity = dt > 0 ? distance / dt : 0;
                
                // Only trigger if movement exceeds threshold and enough time has passed
                if (distance > this.config.movementThreshold && 
                    (timestamp - this.lastStrikeTime) > this.config.minStrikeInterval) {
                    
                    // Map position to musical parameters
                    const normX = x / window.innerWidth;  // 0-1
                    const normY = y / window.innerHeight; // 0-1
                    
                    // Pitch: Y position maps to scale degree (0-12)
                    // Top = high pitch, bottom = low pitch
                    const degree = (1 - normY) * 12;
                    const freq = this.degreeToFreq(degree);
                    
                    // Amplitude: Based on velocity and normalized position
                    const amp = Math.min(1.0, Math.max(0.1, velocity * 0.015 * Math.pow(normY, 1.2)));
                    
                    // Pan: X position maps to stereo field
                    const pan = (normX - 0.5) * 1.4; // -0.7 to 0.7
                    
                    // Play the note
                    this.playNote(freq, amp, pan);
                    
                    // Update stats
                    this.noteCount++;
                    this.lastStrikeTime = timestamp;
                    
                    // Update UI
                    this.updateUI(freq, velocity);
                    
                    // Create visual ripple
                    this.createRipple(x, y);
                }
                
                this.lastPosition = { x, y };
                this.lastTime = timestamp;
            }

            updateUI(freq, velocity) {
                document.getElementById('note-count').textContent = this.noteCount;
                document.getElementById('current-freq').textContent = freq.toFixed(1) + ' Hz';
                document.getElementById('velocity').textContent = velocity.toFixed(2);
            }

            createRipple(x, y) {
                const ripple = document.createElement('div');
                ripple.className = 'ripple';
                ripple.style.left = x + 'px';
                ripple.style.top = y + 'px';
                document.body.appendChild(ripple);
                
                setTimeout(() => ripple.remove(), 1500);
            }

            setMode(mode) {
                this.currentMode = mode;
            }
        }

        // ======================
        // Visualizer
        // ======================
        class Visualizer {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.particles = [];
                this.resize();
                
                window.addEventListener('resize', () => this.resize());
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            addParticle(x, y, velocity) {
                const hue = 30 + (y / window.innerHeight) * 20; // Warm colors
                for (let i = 0; i < 5; i++) {
                    this.particles.push({
                        x,
                        y,
                        vx: (Math.random() - 0.5) * velocity * 0.5,
                        vy: (Math.random() - 0.5) * velocity * 0.5,
                        life: 1,
                        size: Math.random() * 3 + 1,
                        hue
                    });
                }
            }

            update() {
                this.ctx.fillStyle = 'rgba(26, 26, 46, 0.1)';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= 0.02;
                    
                    if (p.life <= 0) {
                        this.particles.splice(i, 1);
                        continue;
                    }
                    
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                    this.ctx.fillStyle = `hsla(${p.hue}, 60%, 70%, ${p.life * 0.6})`;
                    this.ctx.fill();
                }
                
                requestAnimationFrame(() => this.update());
            }
        }

        // ======================
        // BLE Scanner
        // Uses Electron's native BLE API (via Noble) to scan for nearby BLE devices
        // and generate sounds based on RSSI (signal strength)
        // ======================
        class BLEScanner {
            constructor(bleTones, visualizer) {
                this.bleTones = bleTones;
                this.visualizer = visualizer;
                this.isScanning = false;
                this.isDemoMode = false;
                this.devices = new Map(); // MAC -> { name, rssi, lastRssi, lastSeen }
                this.scanAbortController = null;
                this.isElectron = typeof window.electronBLE !== 'undefined';
                
                // Configuration matching bridge.py behavior
                this.config = {
                    movementThreshold: 0.04, // RSSI must change by this much (normalized)
                    minStrikeInterval: 300,  // ms between strikes per device
                    deviceTimeout: 5000      // Remove devices not seen for 5s
                };
                
                this.lastStrike = new Map(); // MAC -> timestamp
                
                // Setup Electron BLE listener if available
                if (this.isElectron) {
                    window.electronBLE.onAdvertisement((data) => {
                        this.processDeviceSignal(data.id, data.name, data.rssi);
                    });
                }
                
                // Update initial UI with info about capabilities
                this.updateCapabilityInfo();
            }

            // Update capability info in UI
            updateCapabilityInfo() {
                const infoEl = document.getElementById('ble-info');
                if (!infoEl) return;
                
                if (this.isElectron) {
                    infoEl.innerHTML = '✅ Native BLE scanning available (Electron app)';
                } else if (this.isScanningSupported()) {
                    infoEl.innerHTML = '✅ Passive BLE scanning available';
                } else if (this.isSupported()) {
                    infoEl.innerHTML = `
                        ⚠️ <strong>Passive scanning unavailable</strong><br>
                        Chrome requires <a href="chrome://flags/#enable-experimental-web-platform-features" target="_blank">experimental features</a> flag.<br>
                        <strong>Try Demo Mode</strong> for a simulated experience, or use <strong>Real BLE</strong> to pair with a specific device.
                    `;
                } else {
                    infoEl.innerHTML = '❌ Web Bluetooth not supported in this browser. Try Chrome.';
                }
            }

            // Check if Web Bluetooth is available
            isSupported() {
                return this.isElectron || ('bluetooth' in navigator);
            }

            // Check if BLE scanning is supported (experimental API or Electron)
            isScanningSupported() {
                return this.isElectron || ('bluetooth' in navigator && 'requestLEScan' in navigator.bluetooth);
            }

            // Normalize RSSI from -100..-30 dBm to 0..1 range (matching bridge.py)
            normalizeRSSI(rssi) {
                return Math.max(0.0, Math.min(1.0, (rssi + 100) / 70));
            }

            // Start Demo Mode with simulated BLE devices
            async startDemoMode() {
                const statusEl = document.getElementById('ble-scanning-status');
                const scanBtn = document.getElementById('ble-scan-btn');
                const demoBtn = document.getElementById('ble-demo-btn');
                const errorEl = document.getElementById('ble-error');
                const infoEl = document.getElementById('ble-info');
                
                errorEl.textContent = '';
                
                this.isScanning = true;
                this.isDemoMode = true;
                statusEl.innerHTML = '<span class="ble-scanning">🎭 Demo Mode - Simulating BLE devices...</span>';
                scanBtn.disabled = true;
                demoBtn.textContent = 'Stop Demo';
                infoEl.innerHTML = '🎭 Generating simulated BLE signals for demonstration. No real Bluetooth required.';
                
                // Create multiple simulated devices with different movement patterns
                this.demoDevices = [
                    { id: 'demo-walking', name: 'Walking Person', baseRssi: -60, variation: 20, speed: 0.8 },
                    { id: 'demo-stationary', name: 'Stationary Device', baseRssi: -45, variation: 5, speed: 0.2 },
                    { id: 'demo-approaching', name: 'Approaching Object', baseRssi: -80, variation: 30, speed: 1.2 }
                ];
                
                this.simulationInterval = setInterval(() => {
                    if (!this.isScanning) return;
                    
                    this.demoDevices.forEach(device => {
                        // Generate realistic RSSI patterns
                        const time = Date.now() / 1000;
                        const variation = Math.sin(time * device.speed) * device.variation 
                                        + (Math.random() - 0.5) * 8;
                        const rssi = Math.round(device.baseRssi + variation);
                        
                        this.processDeviceSignal(device.id, device.name, rssi);
                    });
                }, 200);
                
                // Start cleanup interval
                this.cleanupInterval = setInterval(() => this.cleanupOldDevices(), 1000);
                
                return true;
            }

            // Start BLE scanning
            async startScan() {
                const statusEl = document.getElementById('ble-scanning-status');
                const errorEl = document.getElementById('ble-error');
                const infoEl = document.getElementById('ble-info');
                const scanBtn = document.getElementById('ble-scan-btn');
                const demoBtn = document.getElementById('ble-demo-btn');
                
                errorEl.textContent = '';
                
                // Use Electron's native BLE if available
                if (this.isElectron) {
                    try {
                        const result = await window.electronBLE.startScan();
                        if (result.success) {
                            this.isScanning = true;
                            this.isDemoMode = false;
                            statusEl.innerHTML = '<span class="ble-scanning">🔍 Scanning for BLE devices...</span>';
                            scanBtn.textContent = '⏹ Stop Scan';
                            demoBtn.disabled = true;
                            infoEl.innerHTML = '✅ Native BLE scanning active - detecting all nearby devices!';
                            
                            // Start cleanup interval
                            this.cleanupInterval = setInterval(() => this.cleanupOldDevices(), 1000);
                            
                            return true;
                        }
                    } catch (error) {
                        console.error('Electron BLE scan error:', error);
                        errorEl.textContent = `Error: ${error.message}`;
                        if (error.message.includes('poweredOn')) {
                            infoEl.innerHTML = '⚠️ Please turn on Bluetooth and try again, or use <strong>Demo Mode</strong>.';
                        }
                        return false;
                    }
                }
                
                if (!this.isSupported()) {
                    errorEl.textContent = 'Web Bluetooth is not supported in this browser. Try Chrome.';
                    infoEl.innerHTML = '💡 <strong>Tip:</strong> Use <strong>Demo Mode</strong> to experience simulated BLE sounds.';
                    return false;
                }

                try {
                    if (this.isScanningSupported()) {
                        // Use the experimental requestLEScan API for passive scanning
                        demoBtn.disabled = true;
                        return await this.startPassiveScan();
                    } else {
                        // Fall back to requestDevice (requires user to select a device)
                        infoEl.innerHTML = `
                            ⚠️ <strong>Pairing required:</strong> Chrome will open a device picker.<br>
                            Select a BLE device to monitor its signal. Cancel the dialog to try Demo Mode instead.
                        `;
                        demoBtn.disabled = true;
                        return await this.startDeviceScan();
                    }
                } catch (error) {
                    console.error('BLE scan error:', error);
                    
                    // Provide more helpful error messages
                    if (error.message.includes('cancelled') || error.message.includes('canceled')) {
                        errorEl.textContent = 'Device selection cancelled.';
                        infoEl.innerHTML = '💡 <strong>Tip:</strong> Try <strong>Demo Mode</strong> for simulated BLE sounds without pairing.';
                    } else if (error.message.includes('permission')) {
                        errorEl.textContent = 'Bluetooth permission denied.';
                        infoEl.innerHTML = '💡 Enable Bluetooth permissions in browser settings, or try <strong>Demo Mode</strong>.';
                    } else {
                        errorEl.textContent = `Error: ${error.message}`;
                    }
                    
                    statusEl.textContent = 'Choose a scanning mode below';
                    statusEl.classList.remove('ble-scanning');
                    scanBtn.textContent = '🔍 Real BLE';
                    scanBtn.disabled = false;
                    demoBtn.disabled = false;
                    return false;
                }
            }

            // Passive BLE scanning (experimental API)
            async startPassiveScan() {
                const statusEl = document.getElementById('ble-scanning-status');
                const scanBtn = document.getElementById('ble-scan-btn');
                const infoEl = document.getElementById('ble-info');
                
                this.scanAbortController = new AbortController();
                
                const scan = await navigator.bluetooth.requestLEScan({
                    acceptAllAdvertisements: true,
                    keepRepeatedDevices: true
                }, { signal: this.scanAbortController.signal });
                
                this.isScanning = true;
                this.isDemoMode = false;
                statusEl.innerHTML = '<span class="ble-scanning">Scanning for BLE devices...</span>';
                scanBtn.textContent = '⏹ Stop Scan';
                infoEl.innerHTML = '✅ Passive scanning active - no pairing required!';
                
                navigator.bluetooth.addEventListener('advertisementreceived', (event) => {
                    this.handleAdvertisement(event);
                });
                
                // Start cleanup interval
                this.cleanupInterval = setInterval(() => this.cleanupOldDevices(), 1000);
                
                return true;
            }

            // Device selection scanning (fallback for browsers without requestLEScan)
            async startDeviceScan() {
                const statusEl = document.getElementById('ble-scanning-status');
                const errorEl = document.getElementById('ble-error');
                const scanBtn = document.getElementById('ble-scan-btn');
                const infoEl = document.getElementById('ble-info');
                
                statusEl.innerHTML = '<span class="ble-scanning">Select a BLE device from the picker...</span>';
                
                // Request any BLE device (opens system picker)
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [] // We just want RSSI, no specific services
                });
                
                if (device) {
                    this.isScanning = true;
                    this.isDemoMode = false;
                    statusEl.innerHTML = `<span class="ble-scanning">Monitoring: ${device.name || 'Unknown Device'}</span>`;
                    scanBtn.textContent = '⏹ Stop';
                    infoEl.innerHTML = `📡 Paired with "${device.name || 'Unknown'}". Monitoring signal strength changes.`;
                    
                    // Watch for advertisements from this device
                    if (device.watchAdvertisements) {
                        await device.watchAdvertisements();
                        device.addEventListener('advertisementreceived', (event) => {
                            this.handleAdvertisement(event);
                        });
                    } else {
                        // If watchAdvertisements isn't available, simulate with the device info
                        infoEl.innerHTML = `📡 Monitoring "${device.name || 'Unknown'}" with simulated signal variations.`;
                        this.simulateDeviceScanning(device);
                    }
                    
                    // Start cleanup interval
                    this.cleanupInterval = setInterval(() => this.cleanupOldDevices(), 1000);
                    
                    return true;
                }
                
                return false;
            }

            // Simulate scanning for browsers that don't fully support BLE scanning
            simulateDeviceScanning(device) {
                const statusEl = document.getElementById('ble-scanning-status');
                statusEl.innerHTML = '<span class="ble-scanning">Generating tones from simulated BLE signals...</span>';
                
                // Simulated RSSI parameters for demonstration
                // Base RSSI: -60 dBm represents a typical mid-range BLE signal
                // Variation: ±20 dBm sinusoidal wave + ±5 dBm random noise simulates walking motion
                // Update rate: 200ms (5Hz) matches typical BLE advertisement intervals
                this.simulationInterval = setInterval(() => {
                    if (!this.isScanning) return;
                    
                    const baseRssi = -60;
                    const variation = Math.sin(Date.now() / 1000) * 20 + (Math.random() - 0.5) * 10;
                    const rssi = Math.round(baseRssi + variation);
                    
                    this.processDeviceSignal(
                        device.id || 'device-1',
                        device.name || 'BLE Device',
                        rssi
                    );
                }, 200);
            }

            // Handle BLE advertisement event
            handleAdvertisement(event) {
                const device = event.device;
                const rssi = event.rssi;
                const name = device.name || 'Unknown';
                const id = device.id;
                
                this.processDeviceSignal(id, name, rssi);
            }

            // Process a device signal and potentially trigger a sound
            processDeviceSignal(id, name, rssi) {
                const now = Date.now();
                const normRssi = this.normalizeRSSI(rssi);
                
                // Get or create device entry
                let deviceData = this.devices.get(id);
                if (!deviceData) {
                    deviceData = {
                        name: name,
                        rssi: normRssi,
                        lastRssi: normRssi,
                        lastSeen: now,
                        rawRssi: rssi
                    };
                    this.devices.set(id, deviceData);
                }
                
                // Calculate delta (change in signal strength)
                const delta = Math.abs(normRssi - deviceData.lastRssi);
                
                // Update device data
                deviceData.rssi = normRssi;
                deviceData.lastSeen = now;
                deviceData.rawRssi = rssi;
                deviceData.name = name || deviceData.name;
                
                // Check if we should trigger a sound (matching bridge.py/woods.scd logic)
                const lastStrikeTime = this.lastStrike.get(id) || 0;
                
                if (delta > this.config.movementThreshold && 
                    (now - lastStrikeTime) > this.config.minStrikeInterval) {
                    
                    // Trigger sound!
                    this.triggerSound(id, name, normRssi, delta);
                    this.lastStrike.set(id, now);
                }
                
                // Update last RSSI for next comparison
                deviceData.lastRssi = normRssi;
                
                // Update UI
                this.updateDeviceList();
            }

            // Trigger a sound based on BLE signal
            triggerSound(id, name, normRssi, delta) {
                if (!this.bleTones.isActive) return;
                
                // Map RSSI to musical parameters (matching woods.scd logic)
                // Close = high RSSI = high pitch, Far = low RSSI = low pitch
                // Scale degree range 0-12 spans ~2 octaves of the pentatonic scale
                const degree = (1 - normRssi) * 12;
                const freq = this.bleTones.degreeToFreq(degree);
                
                // Amplitude calculation matching woods.scd: amp = normRssi^1.2 * (delta * 10)
                // - normRssi^1.2: slight curve so closer signals are louder
                // - delta * 10: scale factor makes signal changes more audible
                const amp = Math.min(1.0, Math.max(0.1, 
                    Math.pow(normRssi, 1.2) * (delta * 10)
                ));
                
                // Random pan for spatial distribution (-0.7 to 0.7, matching woods.scd rrand)
                const pan = (Math.random() - 0.5) * 1.4;
                
                // Play the note
                this.bleTones.playNote(freq, amp, pan);
                
                // Update note count
                this.bleTones.noteCount++;
                this.bleTones.updateUI(freq, delta);
                
                // Create visual effect at random position weighted by signal strength
                const x = Math.random() * window.innerWidth;
                const y = (1 - normRssi) * window.innerHeight;
                this.bleTones.createRipple(x, y);
                this.visualizer.addParticle(x, y, delta * 100);
                
                console.log(`📡 BLE Strike: ${name} | RSSI: ${normRssi.toFixed(2)} | Freq: ${freq.toFixed(1)}Hz`);
            }

            // Update the device list in the UI
            updateDeviceList() {
                const listEl = document.getElementById('device-list');
                listEl.innerHTML = '';
                
                for (const [id, data] of this.devices) {
                    const item = document.createElement('div');
                    item.className = 'device-item';
                    item.innerHTML = `
                        <span class="device-name" title="${id}">${data.name}</span>
                        <span class="device-rssi">${data.rawRssi} dBm</span>
                    `;
                    listEl.appendChild(item);
                }
            }

            // Remove devices that haven't been seen recently
            cleanupOldDevices() {
                const now = Date.now();
                for (const [id, data] of this.devices) {
                    if (now - data.lastSeen > this.config.deviceTimeout) {
                        this.devices.delete(id);
                        this.lastStrike.delete(id);
                    }
                }
                this.updateDeviceList();
            }

            // Stop BLE scanning
            async stopScan() {
                const statusEl = document.getElementById('ble-scanning-status');
                const scanBtn = document.getElementById('ble-scan-btn');
                const demoBtn = document.getElementById('ble-demo-btn');
                
                this.isScanning = false;
                this.isDemoMode = false;
                
                // Stop Electron BLE if available
                if (this.isElectron) {
                    try {
                        await window.electronBLE.stopScan();
                    } catch (error) {
                        console.error('Error stopping Electron BLE scan:', error);
                    }
                }
                
                if (this.scanAbortController) {
                    this.scanAbortController.abort();
                    this.scanAbortController = null;
                }
                
                if (this.cleanupInterval) {
                    clearInterval(this.cleanupInterval);
                    this.cleanupInterval = null;
                }
                
                if (this.simulationInterval) {
                    clearInterval(this.simulationInterval);
                    this.simulationInterval = null;
                }
                
                statusEl.textContent = 'Choose a scanning mode below';
                statusEl.classList.remove('ble-scanning');
                scanBtn.textContent = '🔍 Real BLE';
                scanBtn.disabled = false;
                demoBtn.textContent = '🎭 Demo Mode';
                demoBtn.disabled = false;
                
                // Restore capability info
                this.updateCapabilityInfo();
                
                this.devices.clear();
                this.lastStrike.clear();
                this.updateDeviceList();
            }
        }

        // ======================
        // Main App
        // ======================
        const bleTones = new BleTones();
        const canvas = document.getElementById('visualizer');
        const visualizer = new Visualizer(canvas);
        const startBtn = document.getElementById('start-btn');
        const modeButtons = document.querySelectorAll('.mode-btn');
        const inputButtons = document.querySelectorAll('.input-btn[data-input]');
        const bleStatus = document.getElementById('ble-status');
        const bleScanBtn = document.getElementById('ble-scan-btn');
        const bleDemoBtn = document.getElementById('ble-demo-btn');
        const bleModeBtn = document.getElementById('ble-mode-btn');
        const instructionsEl = document.getElementById('instructions');
        
        // BLE Scanner instance
        let bleScanner = null;
        let currentInputMode = 'mouse'; // 'mouse' or 'ble'

        // Start button
        startBtn.addEventListener('click', async () => {
            await bleTones.init();
            bleScanner = new BLEScanner(bleTones, visualizer);
            
            startBtn.textContent = 'Playing...';
            startBtn.disabled = true;
            visualizer.update();
        });

        // Sound mode buttons (instrument selection)
        modeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                modeButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                bleTones.setMode(btn.dataset.mode);
            });
        });

        // Input mode buttons (mouse/touch vs BLE)
        inputButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                if (btn.disabled) return;
                
                inputButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentInputMode = btn.dataset.input;
                
                // Update UI based on input mode
                if (currentInputMode === 'ble') {
                    bleStatus.classList.remove('hidden');
                    instructionsEl.innerHTML = `
                        <p><strong>BLE devices</strong> generate sounds based on signal strength changes</p>
                        <p>Use <strong>Demo Mode</strong> to experience without real Bluetooth</p>
                    `;
                } else {
                    bleStatus.classList.add('hidden');
                    if (bleScanner && bleScanner.isScanning) {
                        bleScanner.stopScan();
                    }
                    instructionsEl.innerHTML = `
                        <p><strong>Move your mouse</strong> or <strong>touch the screen</strong> to create sounds</p>
                        <p>Movement speed affects volume • Position affects pitch</p>
                    `;
                }
            });
        });

        // BLE Scan button (Real BLE)
        bleScanBtn.addEventListener('click', async () => {
            if (!bleScanner) {
                alert('Please click "Begin Experience" first to initialize audio.');
                return;
            }
            
            if (bleScanner.isScanning && !bleScanner.isDemoMode) {
                bleScanner.stopScan();
            } else {
                if (bleScanner.isScanning) {
                    bleScanner.stopScan();
                }
                await bleScanner.startScan();
            }
        });

        // BLE Demo button
        bleDemoBtn.addEventListener('click', async () => {
            if (!bleScanner) {
                alert('Please click "Begin Experience" first to initialize audio.');
                return;
            }
            
            if (bleScanner.isScanning && bleScanner.isDemoMode) {
                bleScanner.stopScan();
            } else {
                if (bleScanner.isScanning) {
                    bleScanner.stopScan();
                }
                await bleScanner.startDemoMode();
            }
        });

        // Mouse movement - only when in mouse mode
        document.addEventListener('mousemove', (e) => {
            if (currentInputMode !== 'mouse') return;
            
            const velocity = Math.sqrt(e.movementX ** 2 + e.movementY ** 2);
            bleTones.processMovement(e.clientX, e.clientY, performance.now());
            
            if (bleTones.isActive && velocity > 5) {
                visualizer.addParticle(e.clientX, e.clientY, velocity);
            }
        });

        // Touch support - only when in mouse mode
        document.addEventListener('touchmove', (e) => {
            if (currentInputMode !== 'mouse') return;
            
            e.preventDefault();
            const touch = e.touches[0];
            bleTones.processMovement(touch.clientX, touch.clientY, performance.now());
            visualizer.addParticle(touch.clientX, touch.clientY, 20);
        }, { passive: false });

        // Initial touch to establish position
        document.addEventListener('touchstart', (e) => {
            if (currentInputMode !== 'mouse') return;
            
            const touch = e.touches[0];
            bleTones.lastPosition = { x: touch.clientX, y: touch.clientY };
            bleTones.lastTime = performance.now();
        });

        // Update UI to show Electron mode
        if (typeof window.electronBLE !== 'undefined') {
            const subtitle = document.querySelector('.subtitle');
            if (subtitle) {
                subtitle.textContent = 'Standalone Desktop App • Full BLE Support';
                subtitle.style.color = '#90ee90';
            }
        }
    </script>
</body>
