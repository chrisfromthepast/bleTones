<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bleTones - Generative Sound Experience</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow: hidden;
            color: #e8e8e8;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            z-index: 10;
        }

        h1 {
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            color: #e8d5b7;
            text-shadow: 0 0 30px rgba(232, 213, 183, 0.3);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1rem;
            color: #8e9aaf;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        #start-btn {
            background: linear-gradient(135deg, #e8d5b7 0%, #d4a373 100%);
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            letter-spacing: 0.2em;
            color: #1a1a2e;
            cursor: pointer;
            border-radius: 50px;
            margin: 20px 0;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-weight: 600;
            z-index: 10;
        }

        #start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(232, 213, 183, 0.4);
        }

        #start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #visualizer {
            width: 100%;
            height: 100%;
        }

        .instructions {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            background: rgba(26, 26, 46, 0.8);
            padding: 15px 30px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .instructions p {
            font-size: 0.9rem;
            color: #8e9aaf;
            margin: 5px 0;
        }

        .instructions strong {
            color: #e8d5b7;
        }

        .info-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(26, 26, 46, 0.8);
            padding: 15px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            z-index: 10;
            font-size: 0.85rem;
        }

        .info-panel h3 {
            color: #e8d5b7;
            margin-bottom: 10px;
            font-weight: 400;
            letter-spacing: 0.1em;
        }

        .stat {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            color: #8e9aaf;
        }

        .stat-value {
            color: #e8d5b7;
            font-family: monospace;
        }

        .sound-mode {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 10;
        }

        .mode-btn {
            background: rgba(232, 213, 183, 0.1);
            border: 1px solid rgba(232, 213, 183, 0.3);
            padding: 8px 16px;
            font-size: 0.8rem;
            color: #e8d5b7;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .mode-btn:hover {
            background: rgba(232, 213, 183, 0.2);
        }

        .mode-btn.active {
            background: rgba(232, 213, 183, 0.3);
            border-color: #e8d5b7;
        }

        .credits {
            position: fixed;
            bottom: 10px;
            right: 20px;
            font-size: 0.75rem;
            color: #555;
            z-index: 10;
        }

        .credits a {
            color: #8e9aaf;
            text-decoration: none;
        }

        /* Ripple effect */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(232, 213, 183, 0.4) 0%, transparent 70%);
            pointer-events: none;
            animation: ripple-animation 1.5s ease-out forwards;
            z-index: 5;
        }

        @keyframes ripple-animation {
            0% {
                width: 0;
                height: 0;
                opacity: 1;
            }
            100% {
                width: 300px;
                height: 300px;
                opacity: 0;
                margin-left: -150px;
                margin-top: -150px;
            }
        }

        /* Mobile styles */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .info-panel {
                display: none;
            }

            .instructions {
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="canvas-container">
        <canvas id="visualizer"></canvas>
    </div>

    <div class="container">
        <header>
            <h1>bleTones</h1>
            <p class="subtitle">Generative Sound Experience</p>
        </header>

        <button id="start-btn">Begin Experience</button>

        <div class="sound-mode">
            <button class="mode-btn active" data-mode="woodChime">Wood Chimes</button>
            <button class="mode-btn" data-mode="deepLog">Deep Log</button>
            <button class="mode-btn" data-mode="hollowReed">Hollow Reed</button>
            <button class="mode-btn" data-mode="kalimba">Kalimba</button>
        </div>
    </div>

    <div class="info-panel">
        <h3>Sound Stats</h3>
        <div class="stat">
            <span>Notes Played:</span>
            <span class="stat-value" id="note-count">0</span>
        </div>
        <div class="stat">
            <span>Current Freq:</span>
            <span class="stat-value" id="current-freq">--</span>
        </div>
        <div class="stat">
            <span>Velocity:</span>
            <span class="stat-value" id="velocity">--</span>
        </div>
    </div>

    <div class="instructions">
        <p><strong>Move your mouse</strong> or <strong>touch the screen</strong> to create sounds</p>
        <p>Movement speed affects volume • Position affects pitch</p>
    </div>

    <div class="credits">
        <a href="https://github.com/chrisfromthepast/bleTones" target="_blank">View on GitHub</a>
    </div>

    <script>
        // ======================
        // bleTones Web Audio Implementation
        // Inspired by the original SuperCollider generative music system
        // ======================

        class BleTones {
            constructor() {
                this.audioContext = null;
                this.masterGain = null;
                this.reverbNode = null;
                this.isActive = false;
                this.noteCount = 0;
                this.lastPosition = { x: 0, y: 0 };
                this.lastTime = 0;
                this.currentMode = 'woodChime';
                
                // Musical configuration (matching SuperCollider version)
                this.config = {
                    masterVol: 0.6,
                    rootNote: 36, // MIDI note number
                    scale: [0, 2, 3, 7, 9], // Minor pentatonic intervals
                    movementThreshold: 5,
                    minStrikeInterval: 100 // ms
                };
                
                this.lastStrikeTime = 0;
            }

            async init() {
                // Create audio context
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // Create master gain
                this.masterGain = this.audioContext.createGain();
                this.masterGain.gain.value = this.config.masterVol;
                this.masterGain.connect(this.audioContext.destination);
                
                // Create reverb send bus
                // Instruments connect to reverbInput, which splits to dry + wet paths
                this.reverbInput = this.audioContext.createGain();
                this.createReverb();
                
                this.isActive = true;
                console.log('🎵 bleTones initialized');
            }

            createReverb() {
                const ctx = this.audioContext;
                
                // Create convolver for reverb
                const convolver = ctx.createConvolver();
                const sampleRate = ctx.sampleRate;
                const length = sampleRate * 2; // 2 second reverb tail
                const impulse = ctx.createBuffer(2, length, sampleRate);
                
                for (let channel = 0; channel < 2; channel++) {
                    const channelData = impulse.getChannelData(channel);
                    for (let i = 0; i < length; i++) {
                        channelData[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2);
                    }
                }
                convolver.buffer = impulse;
                
                // Dry path (direct signal)
                const dryGain = ctx.createGain();
                dryGain.gain.value = 0.7;
                
                // Wet path (reverb signal)
                const wetGain = ctx.createGain();
                wetGain.gain.value = 0.3;
                
                // Connect: reverbInput -> dry -> masterGain
                //          reverbInput -> convolver -> wet -> masterGain
                this.reverbInput.connect(dryGain);
                this.reverbInput.connect(convolver);
                convolver.connect(wetGain);
                
                dryGain.connect(this.masterGain);
                wetGain.connect(this.masterGain);
            }

            // Convert scale degree to frequency (matching SuperCollider behavior)
            degreeToFreq(degree) {
                const rootFreq = 440 * Math.pow(2, (this.config.rootNote - 69) / 12);
                const scaleLen = this.config.scale.length;
                const octave = Math.floor(degree / scaleLen);
                const scaleDegree = Math.floor(degree) % scaleLen;
                const interval = this.config.scale[Math.abs(scaleDegree)];
                return rootFreq * Math.pow(2, (interval + octave * 12) / 12);
            }

            // Wood Chime sound (matching SuperCollider \woodChime)
            playWoodChime(freq, amp, pan) {
                const ctx = this.audioContext;
                const now = ctx.currentTime;
                
                // Create noise burst (exciter)
                const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.01, ctx.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseData.length; i++) {
                    noiseData[i] = (Math.random() * 2 - 1) * 0.1;
                }
                
                const noise = ctx.createBufferSource();
                noise.buffer = noiseBuffer;
                
                // Create resonant filters (simulating Ringz)
                const filter1 = ctx.createBiquadFilter();
                filter1.type = 'bandpass';
                filter1.frequency.value = freq;
                filter1.Q.value = 30;
                
                const filter2 = ctx.createBiquadFilter();
                filter2.type = 'bandpass';
                filter2.frequency.value = freq * 2.01;
                filter2.Q.value = 25;
                
                // Low pass filter for warmer tone
                const lpf = ctx.createBiquadFilter();
                lpf.type = 'lowpass';
                lpf.frequency.value = Math.min(freq * 4, 3000);
                
                // Envelope
                const envelope = ctx.createGain();
                envelope.gain.setValueAtTime(0, now);
                envelope.gain.linearRampToValueAtTime(amp, now + 0.002);
                envelope.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
                
                // Panning
                const panner = ctx.createStereoPanner();
                panner.pan.value = pan;
                
                // Connect
                noise.connect(filter1);
                noise.connect(filter2);
                filter1.connect(lpf);
                filter2.connect(lpf);
                lpf.connect(envelope);
                envelope.connect(panner);
                panner.connect(this.reverbInput);
                
                noise.start(now);
                noise.stop(now + 0.01);
                
                // Schedule cleanup
                setTimeout(() => {
                    filter1.disconnect();
                    filter2.disconnect();
                    lpf.disconnect();
                    envelope.disconnect();
                    panner.disconnect();
                }, 1000);
            }

            // Deep Log drum sound (matching SuperCollider \deepLog)
            playDeepLog(freq, amp, pan) {
                const ctx = this.audioContext;
                const now = ctx.currentTime;
                
                // Create sine oscillators
                const osc1 = ctx.createOscillator();
                const osc2 = ctx.createOscillator();
                const osc3 = ctx.createOscillator();
                
                osc1.frequency.value = freq;
                osc2.frequency.value = freq * 1.5;
                osc3.frequency.value = freq * 2.6;
                
                // Gains for each oscillator
                const gain1 = ctx.createGain();
                const gain2 = ctx.createGain();
                const gain3 = ctx.createGain();
                
                gain1.gain.value = amp;
                gain2.gain.value = amp * 0.4;
                gain3.gain.value = amp * 0.2;
                
                // Main envelope
                const envelope = ctx.createGain();
                envelope.gain.setValueAtTime(0, now);
                envelope.gain.linearRampToValueAtTime(1, now + 0.01);
                envelope.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
                
                // Low pass
                const lpf = ctx.createBiquadFilter();
                lpf.type = 'lowpass';
                lpf.frequency.value = 1000;
                
                // Panning
                const panner = ctx.createStereoPanner();
                panner.pan.value = pan;
                
                // Connect
                osc1.connect(gain1);
                osc2.connect(gain2);
                osc3.connect(gain3);
                gain1.connect(lpf);
                gain2.connect(lpf);
                gain3.connect(lpf);
                lpf.connect(envelope);
                envelope.connect(panner);
                panner.connect(this.reverbInput);
                
                osc1.start(now);
                osc2.start(now);
                osc3.start(now);
                osc1.stop(now + 1.3);
                osc2.stop(now + 1.3);
                osc3.stop(now + 1.3);
                
                setTimeout(() => {
                    gain1.disconnect();
                    gain2.disconnect();
                    gain3.disconnect();
                    lpf.disconnect();
                    envelope.disconnect();
                    panner.disconnect();
                }, 1500);
            }

            // Hollow Reed sound (matching SuperCollider \hollowReed)
            playHollowReed(freq, amp, pan) {
                const ctx = this.audioContext;
                const now = ctx.currentTime;
                
                // Create noise burst
                const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 0.005, ctx.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseData.length; i++) {
                    noiseData[i] = (Math.random() * 2 - 1) * 0.03;
                }
                
                const noise = ctx.createBufferSource();
                noise.buffer = noiseBuffer;
                
                // Bandpass filters for hollow sound
                const filter1 = ctx.createBiquadFilter();
                filter1.type = 'bandpass';
                filter1.frequency.value = freq * 2;
                filter1.Q.value = 15;
                
                const filter2 = ctx.createBiquadFilter();
                filter2.type = 'bandpass';
                filter2.frequency.value = freq * 3;
                filter2.Q.value = 12;
                
                // Main bandpass
                const mainBpf = ctx.createBiquadFilter();
                mainBpf.type = 'bandpass';
                mainBpf.frequency.value = freq * 2;
                mainBpf.Q.value = 2.5;
                
                // Envelope
                const envelope = ctx.createGain();
                envelope.gain.setValueAtTime(0, now);
                envelope.gain.linearRampToValueAtTime(amp, now + 0.002);
                envelope.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                
                // Panning
                const panner = ctx.createStereoPanner();
                panner.pan.value = pan;
                
                // Connect
                noise.connect(filter1);
                noise.connect(filter2);
                filter1.connect(mainBpf);
                filter2.connect(mainBpf);
                mainBpf.connect(envelope);
                envelope.connect(panner);
                panner.connect(this.reverbInput);
                
                noise.start(now);
                noise.stop(now + 0.005);
                
                setTimeout(() => {
                    filter1.disconnect();
                    filter2.disconnect();
                    mainBpf.disconnect();
                    envelope.disconnect();
                    panner.disconnect();
                }, 600);
            }

            // Kalimba sound (matching SuperCollider \kalimba)
            playKalimba(freq, amp, pan) {
                const ctx = this.audioContext;
                const now = ctx.currentTime;
                
                // Sine + detuned saw
                const osc1 = ctx.createOscillator();
                osc1.type = 'sine';
                osc1.frequency.value = freq;
                
                const osc2 = ctx.createOscillator();
                osc2.type = 'sawtooth';
                osc2.frequency.value = freq * 2.01;
                
                const gain1 = ctx.createGain();
                const gain2 = ctx.createGain();
                gain1.gain.value = amp;
                gain2.gain.value = amp * 0.1;
                
                // Low pass
                const lpf = ctx.createBiquadFilter();
                lpf.type = 'lowpass';
                lpf.frequency.value = freq * 3;
                
                // Envelope with exponential decay
                const envelope = ctx.createGain();
                envelope.gain.setValueAtTime(0, now);
                envelope.gain.linearRampToValueAtTime(1, now + 0.002);
                envelope.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
                
                // Panning
                const panner = ctx.createStereoPanner();
                panner.pan.value = pan;
                
                // Connect
                osc1.connect(gain1);
                osc2.connect(gain2);
                gain1.connect(lpf);
                gain2.connect(lpf);
                lpf.connect(envelope);
                envelope.connect(panner);
                panner.connect(this.reverbInput);
                
                osc1.start(now);
                osc2.start(now);
                osc1.stop(now + 1.3);
                osc2.stop(now + 1.3);
                
                setTimeout(() => {
                    gain1.disconnect();
                    gain2.disconnect();
                    lpf.disconnect();
                    envelope.disconnect();
                    panner.disconnect();
                }, 1500);
            }

            // Play a note based on current mode
            playNote(freq, amp, pan) {
                switch (this.currentMode) {
                    case 'woodChime':
                        this.playWoodChime(freq, amp, pan);
                        break;
                    case 'deepLog':
                        this.playDeepLog(freq, amp, pan);
                        break;
                    case 'hollowReed':
                        this.playHollowReed(freq, amp, pan);
                        break;
                    case 'kalimba':
                        this.playKalimba(freq, amp, pan);
                        break;
                }
            }

            // Process movement (similar to BLE RSSI processing)
            processMovement(x, y, timestamp) {
                if (!this.isActive) return;
                
                const dx = x - this.lastPosition.x;
                const dy = y - this.lastPosition.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const dt = timestamp - this.lastTime;
                
                // Calculate velocity (like RSSI delta)
                const velocity = dt > 0 ? distance / dt : 0;
                
                // Only trigger if movement exceeds threshold and enough time has passed
                if (distance > this.config.movementThreshold && 
                    (timestamp - this.lastStrikeTime) > this.config.minStrikeInterval) {
                    
                    // Map position to musical parameters
                    const normX = x / window.innerWidth;  // 0-1
                    const normY = y / window.innerHeight; // 0-1
                    
                    // Pitch: Y position maps to scale degree (0-12)
                    // Top = high pitch, bottom = low pitch
                    const degree = (1 - normY) * 12;
                    const freq = this.degreeToFreq(degree);
                    
                    // Amplitude: Based on velocity and normalized position
                    const amp = Math.min(1.0, Math.max(0.1, velocity * 0.015 * Math.pow(normY, 1.2)));
                    
                    // Pan: X position maps to stereo field
                    const pan = (normX - 0.5) * 1.4; // -0.7 to 0.7
                    
                    // Play the note
                    this.playNote(freq, amp, pan);
                    
                    // Update stats
                    this.noteCount++;
                    this.lastStrikeTime = timestamp;
                    
                    // Update UI
                    this.updateUI(freq, velocity);
                    
                    // Create visual ripple
                    this.createRipple(x, y);
                }
                
                this.lastPosition = { x, y };
                this.lastTime = timestamp;
            }

            updateUI(freq, velocity) {
                document.getElementById('note-count').textContent = this.noteCount;
                document.getElementById('current-freq').textContent = freq.toFixed(1) + ' Hz';
                document.getElementById('velocity').textContent = velocity.toFixed(2);
            }

            createRipple(x, y) {
                const ripple = document.createElement('div');
                ripple.className = 'ripple';
                ripple.style.left = x + 'px';
                ripple.style.top = y + 'px';
                document.body.appendChild(ripple);
                
                setTimeout(() => ripple.remove(), 1500);
            }

            setMode(mode) {
                this.currentMode = mode;
            }
        }

        // ======================
        // Visualizer
        // ======================
        class Visualizer {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.particles = [];
                this.resize();
                
                window.addEventListener('resize', () => this.resize());
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            addParticle(x, y, velocity) {
                const hue = 30 + (y / window.innerHeight) * 20; // Warm colors
                for (let i = 0; i < 5; i++) {
                    this.particles.push({
                        x,
                        y,
                        vx: (Math.random() - 0.5) * velocity * 0.5,
                        vy: (Math.random() - 0.5) * velocity * 0.5,
                        life: 1,
                        size: Math.random() * 3 + 1,
                        hue
                    });
                }
            }

            update() {
                this.ctx.fillStyle = 'rgba(26, 26, 46, 0.1)';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= 0.02;
                    
                    if (p.life <= 0) {
                        this.particles.splice(i, 1);
                        continue;
                    }
                    
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                    this.ctx.fillStyle = `hsla(${p.hue}, 60%, 70%, ${p.life * 0.6})`;
                    this.ctx.fill();
                }
                
                requestAnimationFrame(() => this.update());
            }
        }

        // ======================
        // Main App
        // ======================
        const bleTones = new BleTones();
        const canvas = document.getElementById('visualizer');
        const visualizer = new Visualizer(canvas);
        const startBtn = document.getElementById('start-btn');
        const modeButtons = document.querySelectorAll('.mode-btn');

        // Start button
        startBtn.addEventListener('click', async () => {
            await bleTones.init();
            startBtn.textContent = 'Playing...';
            startBtn.disabled = true;
            visualizer.update();
        });

        // Mode buttons
        modeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                modeButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                bleTones.setMode(btn.dataset.mode);
            });
        });

        // Mouse movement
        document.addEventListener('mousemove', (e) => {
            const velocity = Math.sqrt(e.movementX ** 2 + e.movementY ** 2);
            bleTones.processMovement(e.clientX, e.clientY, performance.now());
            
            if (bleTones.isActive && velocity > 5) {
                visualizer.addParticle(e.clientX, e.clientY, velocity);
            }
        });

        // Touch support
        document.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            bleTones.processMovement(touch.clientX, touch.clientY, performance.now());
            visualizer.addParticle(touch.clientX, touch.clientY, 20);
        }, { passive: false });

        // Initial touch to establish position
        document.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            bleTones.lastPosition = { x: touch.clientX, y: touch.clientY };
            bleTones.lastTime = performance.now();
        });
    </script>
</body>
</html>
